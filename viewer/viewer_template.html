<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{SCENE_TITLE}} — 3D Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: system-ui, sans-serif; overflow: hidden; }
    #canvas-container { width: 100vw; height: 100vh; }
    #overlay {
      position: fixed;
      top: 16px;
      left: 16px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      border-radius: 8px;
      padding: 12px 16px;
      pointer-events: none;
      line-height: 1.6;
    }
    #overlay h2 { font-size: 1rem; font-weight: 600; margin-bottom: 4px; color: #fff; }
    #overlay p  { font-size: 0.8rem; color: #aaa; }
    #controls {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 0.75rem;
      color: #888;
      pointer-events: none;
    }
    #terrain-controls {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      border-radius: 8px;
      padding: 12px 16px;
      min-width: 180px;
    }
    #terrain-controls label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: #aaa;
      margin-bottom: 6px;
      user-select: none;
    }
    #terrain-controls label span { color: #fff; font-weight: 600; }
    #opacity-slider {
      width: 100%;
      accent-color: #e66414;
      cursor: pointer;
    }
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #aaa;
      font-size: 0.9rem;
    }
    #loading .spinner {
      width: 40px; height: 40px;
      border: 3px solid #333;
      border-top-color: #e66414;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="overlay">
    <h2>{{SCENE_TITLE}}</h2>
    <p>Distance: {{DISTANCE_KM}} km &nbsp;·&nbsp; Elevation gain: {{ELE_GAIN_M}} m</p>
    <p style="margin-top:4px; font-size:0.7rem; color:#666;">
      Terrain: OBJ+MTL (satellite texture) &nbsp;·&nbsp; Track: STL (orange)
    </p>
  </div>

  <div id="controls">Left-drag: rotate &nbsp;·&nbsp; Scroll: zoom &nbsp;·&nbsp; Right-drag: pan</div>

  <div id="terrain-controls">
    <label>
      Terrain opacity
      <span id="opacity-value">100%</span>
    </label>
    <input id="opacity-slider" type="range" min="0" max="100" value="100" step="1" />
  </div>

  <div id="loading">
    <div class="spinner"></div>
    Loading 3D models…
  </div>

  <!-- Embedded asset data (injected by Python) -->
  <script>
    const OBJ_TEXT     = {{OBJ_JSON}};
    const TEX_DATA_URI = {{TEX_URI_JSON}};
    const STL_B64      = {{STL_B64_JSON}};
    const FRAME_B64    = {{FRAME_B64_JSON}};
  </script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { OBJLoader }     from 'three/addons/loaders/OBJLoader.js';
    import { STLLoader }     from 'three/addons/loaders/STLLoader.js';

    // ── Renderer ────────────────────────────────────────────────────────────────
    const container = document.getElementById('canvas-container');
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    // ── Scene & Camera ──────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100000);

    // ── Lights ──────────────────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 1.0));

    const sun = new THREE.DirectionalLight(0xfff5e0, 0.8);
    sun.position.set(1, -0.5, 2).normalize();
    sun.castShadow = true;
    scene.add(sun);

    const fill = new THREE.DirectionalLight(0xc0d8ff, 0.3);
    fill.position.set(-1, 1, 0.5).normalize();
    scene.add(fill);

    // ── Controls ────────────────────────────────────────────────────────────────
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.screenSpacePanning = true;

    // ── Loading tracker ──────────────────────────────────────────────────────────
    const loadingEl = document.getElementById('loading');
    const totalAssets = FRAME_B64 ? 3 : 2;
    let loaded = 0;
    function onLoaded() {
      loaded++;
      if (loaded >= totalAssets) {
        loadingEl.style.display = 'none';
        fitCamera();
      }
    }

    // ── Terrain opacity control ───────────────────────────────────────────────
    const terrainMaterials = [];
    const opacitySlider = document.getElementById('opacity-slider');
    const opacityValue  = document.getElementById('opacity-value');

    opacitySlider.addEventListener('input', () => {
      const pct = parseInt(opacitySlider.value, 10);
      const opacity = pct / 100;
      opacityValue.textContent = pct + '%';
      for (const mat of terrainMaterials) {
        mat.opacity = opacity;
        mat.transparent = opacity < 1.0;
        mat.needsUpdate = true;
      }
    });

    // ── Load terrain (inline OBJ + embedded texture) ─────────────────────────
    const textureLoader = new THREE.TextureLoader();
    const texture = textureLoader.load(TEX_DATA_URI);
    texture.colorSpace = THREE.SRGBColorSpace;

    // Strip the mtllib reference so OBJLoader doesn't try to fetch it
    const objText = OBJ_TEXT.split('\n').filter(l => !l.startsWith('mtllib')).join('\n');

    const objLoader = new OBJLoader();
    const terrainObject = objLoader.parse(objText);
    terrainObject.traverse((child) => {
      if (child.isMesh) {
        const mat = new THREE.MeshLambertMaterial({ map: texture });
        child.material = mat;
        child.receiveShadow = true;
        terrainMaterials.push(mat);
      }
    });
    scene.add(terrainObject);
    onLoaded();

    // ── Load track (inline STL) ───────────────────────────────────────────────
    const stlBin = atob(STL_B64);
    const stlBuf = new ArrayBuffer(stlBin.length);
    const stlView = new Uint8Array(stlBuf);
    for (let i = 0; i < stlBin.length; i++) stlView[i] = stlBin.charCodeAt(i);

    const stlLoader = new STLLoader();
    const geometry = stlLoader.parse(stlBuf);
    geometry.computeVertexNormals();
    const trackMat = new THREE.MeshPhongMaterial({
      color: 0xe66414,
      shininess: 80,
      specular: 0x552200,
    });
    const trackMesh = new THREE.Mesh(geometry, trackMat);
    trackMesh.castShadow = true;
    scene.add(trackMesh);
    onLoaded();

    // ── Load frame (inline STL, optional) ────────────────────────────────────────
    if (FRAME_B64) {
      const frameBin = atob(FRAME_B64);
      const frameBuf = new ArrayBuffer(frameBin.length);
      const frameView = new Uint8Array(frameBuf);
      for (let i = 0; i < frameBin.length; i++) frameView[i] = frameBin.charCodeAt(i);

      const frameGeo = new STLLoader().parse(frameBuf);
      frameGeo.computeVertexNormals();
      const frameMat = new THREE.MeshPhongMaterial({
        color: 0xdddddd,
        shininess: 40,
        specular: 0x444444,
      });
      const frameMesh = new THREE.Mesh(frameGeo, frameMat);
      scene.add(frameMesh);
      onLoaded();
    }

    // ── Auto-fit camera to combined bounding box ─────────────────────────────────
    function fitCamera() {
      const box = new THREE.Box3().setFromObject(scene);
      if (box.isEmpty()) return;
      const centre = box.getCenter(new THREE.Vector3());
      const size   = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const fov    = camera.fov * (Math.PI / 180);
      const dist   = Math.abs(maxDim / (2 * Math.tan(fov / 2))) * 1.8;

      camera.position.set(centre.x, centre.y - dist * 0.6, centre.z + dist * 0.5);
      camera.lookAt(centre);
      camera.near = dist * 0.001;
      camera.far  = dist * 20;
      camera.updateProjectionMatrix();
      controls.target.copy(centre);
      controls.minDistance = dist * 0.05;
      controls.maxDistance = dist * 10;
      controls.update();
    }

    // ── Resize handler ───────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── Render loop ──────────────────────────────────────────────────────────────
    (function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    })();
  </script>
</body>
</html>
